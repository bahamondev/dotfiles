- clean: ['~']

- defaults:
    link:
      create: true
      force: true

- link:
    ~/.bash_profile: shell/bash/.bash_profile
    ~/.bashrc: shell/bash/.bashrc
    ~/.zimrc: shell/zsh/.zimrc
    ~/.zlogin: shell/zsh/.zlogin
    ~/.zshenv: shell/zsh/.zshenv
    ~/.zshrc: shell/zsh/.zshrc
    ~/.gitignore: git/.gitignore
    ~/.alacritty.yml: shell/alacritty/.alacritty.yml
    ~/.config/kitty/kitty.conf: shell/kitty/kitty.conf
    ~/.tmux.conf: shell/tmux/.tmux.conf

- create:
      - ~/.z
